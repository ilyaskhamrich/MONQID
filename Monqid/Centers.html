<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monqid – مراكز التبرع</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="index.css">
  <style>
    /* ── Page layout ── */
    .centers-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 64px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .sidebar-header h2 span { color: var(--red); }
    .sidebar-header p { font-size: 12px; color: var(--muted); }

    .sidebar-search {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-search .search-wrap { min-width: unset; }

    .centers-list {
      overflow-y: auto;
      flex: 1;
      padding: 10px 10px;
    }

    .centers-list::-webkit-scrollbar { width: 4px; }
    .centers-list::-webkit-scrollbar-track { background: transparent; }
    .centers-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Center card ── */
    .center-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .center-item:hover,
    .center-item.active {
      border-color: var(--border-r);
      background: rgba(232,48,74,0.06);
    }

    .center-item.active { box-shadow: 0 0 0 1px var(--border-r); }

    .center-item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .center-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      flex: 1;
    }

    .center-status {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
      margin-right: 8px;
    }

    .status-open   { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .status-closed { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

    .center-meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .center-meta-row i { color: var(--red); width: 12px; text-align: center; font-size: 10px; }
    .center-meta-row span { color: #bbb; }

    .center-blood-types {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .blood-chip {
      background: var(--red-soft);
      border: 1px solid var(--border-r);
      color: var(--red);
      font-size: 10px;
      font-weight: 800;
      padding: 1px 7px;
      border-radius: 5px;
    }

    /* ── Map ── */
    #map {
      height: 100%;
      width: 100%;
      z-index: 1;
    }

    /* ── Custom leaflet popup ── */
    .leaflet-popup-content-wrapper {
      background: #1c1c20 !important;
      border: 1px solid rgba(232,48,74,0.3) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      color: #f0f0f2 !important;
      font-family: 'Cairo', sans-serif !important;
    }

    .leaflet-popup-tip { background: #1c1c20 !important; }
    .leaflet-popup-close-button { color: #888 !important; font-size: 18px !important; }
    .leaflet-popup-close-button:hover { color: #fff !important; }

    .popup-content { padding: 4px 2px; min-width: 200px; }
    .popup-name { font-size: 15px; font-weight: 900; margin-bottom: 8px; color: #f0f0f2; }
    .popup-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: #888; margin-bottom: 5px;
    }
    .popup-row i { color: #e8304a; width: 14px; }
    .popup-row span { color: #ccc; }
    .popup-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; margin-top: 10px; padding: 8px;
      background: #e8304a; border: none; border-radius: 8px;
      color: #fff; font-family: 'Cairo', sans-serif;
      font-size: 12px; font-weight: 700; cursor: pointer;
      transition: background 0.2s;
    }
    .popup-btn:hover { background: #ff3d59; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .centers-layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: auto;
      }
      .sidebar {
        height: 320px;
        border-left: none;
        border-bottom: 1px solid var(--border);
      }
      #map { height: 400px; }
    }
  </style>
</head>
<body>

<!-- ═══ MOBILE DRAWER ═══ -->
<div class="mobile-drawer" id="mobileDrawer">
  <a href="index.html"><span>🏠</span> الرئيسية</a>
  <a href="requests.html"><span>🩸</span> طلبات الدم</a>
  <a href="Campagnes.html"><span>📣</span> حملات جديدة</a>
  <a href="Centers.html"><span>📍</span> مراكز التبرع</a>
  <div class="mobile-divider"></div>
  <div class="mobile-auth">
    <a href="#" class="btn-login">تسجيل الدخول</a>
    <a href="#" class="btn-register">إنشاء حساب</a>
  </div>
</div>

<!-- ═══ LAYOUT ═══ -->
<div class="centers-layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>📍 مراكز <span>التبرع</span></h2>
      <p>7 مراكز في المغرب — انقر على مركز لعرضه على الخريطة</p>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <i class="fa fa-search"></i>
        <input type="text" id="search-inp" placeholder="ابحث بالمدينة أو اسم المركز...">
      </div>
    </div>

    <div class="centers-list" id="centers-list"></div>
  </div>

  <!-- Map -->
  <div id="map"></div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  /* ════════ DATA ════════ */
  const centers = [
    {
      id: 1,
      name: 'مركز تحاقن الدم – الرباط',
      city: 'الرباط',
      address: 'شارع محمد الخامس، الرباط',
      phone: '+212 537 767 111',
      hours: 'السبت–الخميس: 08:00–16:00',
      lat: 34.020882, lng: -6.841650,
      open: true,
      blood: ['A+','A-','B+','O+','O-']
    },
    {
      id: 2,
      name: 'مركز تحاقن الدم – الدار البيضاء',
      city: 'الدار البيضاء',
      address: 'حي الحسن الثاني، الدار البيضاء',
      phone: '+212 522 251 000',
      hours: 'السبت–الخميس: 07:30–15:30',
      lat: 33.573110, lng: -7.589843,
      open: true,
      blood: ['A+','B+','B-','AB+','O+']
    },
    {
      id: 3,
      name: 'مركز تحاقن الدم – مراكش',
      city: 'مراكش',
      address: 'المستشفى الإقليمي، مراكش',
      phone: '+212 524 336 222',
      hours: 'الاثنين–الجمعة: 08:00–14:00',
      lat: 31.629472, lng: -7.981084,
      open: false,
      blood: ['A+','O+','O-']
    },
    {
      id: 4,
      name: 'مركز تحاقن الدم – فاس',
      city: 'فاس',
      address: 'المستشفى الجامعي ابن سينا، فاس',
      phone: '+212 535 622 333',
      hours: 'السبت–الخميس: 08:00–16:00',
      lat: 34.033333, lng: -5.000000,
      open: true,
      blood: ['B+','B-','AB-','O+','O-']
    },
    {
      id: 5,
      name: 'مركز تحاقن الدم – طنجة',
      city: 'طنجة',
      address: 'المستشفى المحمدي، طنجة',
      phone: '+212 539 940 444',
      hours: 'السبت–الخميس: 08:00–15:00',
      lat: 35.759465, lng: -5.833954,
      open: true,
      blood: ['A-','AB+','O+','O-']
    },
    {
      id: 6,
      name: 'مركز تحاقن الدم – أكادير',
      city: 'أكادير',
      address: 'المستشفى الحسن الثاني، أكادير',
      phone: '+212 528 822 555',
      hours: 'الاثنين–السبت: 08:00–14:00',
      lat: 30.427755, lng: -9.598107,
      open: true,
      blood: ['A+','B+','O+']
    },
    {
      id: 7,
      name: 'مركز تحاقن الدم – وجدة',
      city: 'وجدة',
      address: 'المستشفى الإقليمي الفارابي، وجدة',
      phone: '+212 536 683 666',
      hours: 'السبت–الخميس: 08:00–16:00',
      lat: 34.686667, lng: -1.911389,
      open: false,
      blood: ['A+','A-','B-','O-']
    }
  ];

  /* ════════ MAP INIT ════════ */
  const map = L.map('map', { zoomControl: false }).setView([31.7917, -7.0926], 6);

  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  // Dark tile layer via CartoDB
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  /* ════════ CUSTOM MARKER ICON ════════ */
  function makeIcon(open) {
    return L.divIcon({
      className: '',
      html: `<div style="
        width:36px;height:36px;border-radius:50% 50% 50% 0;
        background:${open ? '#e8304a' : '#555'};
        border:2px solid ${open ? '#ff6b80' : '#888'};
        display:flex;align-items:center;justify-content:center;
        transform:rotate(-45deg);
        box-shadow:0 0 ${open ? '14px rgba(232,48,74,0.6)' : '6px rgba(0,0,0,0.4)'};
      "><span style="transform:rotate(45deg);font-size:14px">🩸</span></div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 36],
      popupAnchor: [0, -38]
    });
  }

  /* ════════ MARKERS ════════ */
  const markers = {};

  centers.forEach(c => {
    const marker = L.marker([c.lat, c.lng], { icon: makeIcon(c.open) }).addTo(map);

    const bloodHTML = c.blood.map(b => `<span style="
      background:rgba(232,48,74,0.15);border:1px solid rgba(232,48,74,0.3);
      color:#e8304a;font-size:10px;font-weight:800;
      padding:1px 6px;border-radius:4px;margin-left:3px
    ">${b}</span>`).join('');

    marker.bindPopup(`
      <div class="popup-content">
        <div class="popup-name">🩸 ${c.name}</div>
        <div class="popup-row"><i class="fa fa-map-marker-alt"></i><span>${c.address}</span></div>
        <div class="popup-row"><i class="fa fa-phone"></i><span>${c.phone}</span></div>
        <div class="popup-row"><i class="fa fa-clock"></i><span>${c.hours}</span></div>
        <div class="popup-row"><i class="fa fa-tint"></i><span>${bloodHTML}</span></div>
        <div class="popup-row">
          <i class="fa fa-circle" style="color:${c.open ? '#4ade80' : '#f87171'}"></i>
          <span style="color:${c.open ? '#4ade80' : '#f87171'}">${c.open ? 'مفتوح الآن' : 'مغلق حالياً'}</span>
        </div>
        <button class="popup-btn" onclick="window.location.href='tel:${c.phone}'">
          <i class="fa fa-phone"></i> اتصل الآن
        </button>
      </div>
    `, { maxWidth: 260 });

    marker.on('click', () => setActive(c.id));
    markers[c.id] = marker;
  });

  /* ════════ SIDEBAR RENDER ════════ */
  function renderList(query = '') {
    const list = document.getElementById('centers-list');
    const q = query.trim().toLowerCase();

    const filtered = centers.filter(c =>
      !q || c.name.toLowerCase().includes(q) || c.city.toLowerCase().includes(q)
    );

    if (filtered.length === 0) {
      list.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted)">
        <i class="fa fa-map-marked-alt" style="font-size:32px;margin-bottom:12px;display:block;color:var(--border-r)"></i>
        <p>لا توجد مراكز تطابق البحث</p>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(c => `
      <div class="center-item" id="item-${c.id}" onclick="setActive(${c.id})">
        <div class="center-item-top">
          <div class="center-name">${c.name}</div>
          <span class="center-status ${c.open ? 'status-open' : 'status-closed'}">
            ${c.open ? 'مفتوح' : 'مغلق'}
          </span>
        </div>
        <div class="center-meta-row"><i class="fa fa-map-marker-alt"></i><span>${c.address}</span></div>
        <div class="center-meta-row"><i class="fa fa-clock"></i><span>${c.hours}</span></div>
        <div class="center-meta-row"><i class="fa fa-phone"></i><span>${c.phone}</span></div>
        <div class="center-blood-types">
          ${c.blood.map(b => `<span class="blood-chip">${b}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  /* ════════ SET ACTIVE ════════ */
  function setActive(id) {
    // remove old active
    document.querySelectorAll('.center-item').forEach(el => el.classList.remove('active'));

    const item = document.getElementById(`item-${id}`);
    if (item) {
      item.classList.add('active');
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    const c = centers.find(x => x.id === id);
    if (c) {
      map.setView([c.lat, c.lng], 13, { animate: true });
      markers[id].openPopup();
    }
  }

  /* ════════ SEARCH ════════ */
  document.getElementById('search-inp').addEventListener('input', function () {
    renderList(this.value);
  });

  /* ════════ MOBILE MENU ════════ */
  document.getElementById('menuToggle').addEventListener('click', function () {
    const drawer = document.getElementById('mobileDrawer');
    const isOpen = drawer.classList.toggle('open');
    this.textContent = isOpen ? '✕' : '☰';
  });

  document.addEventListener('click', function (e) {
    const drawer = document.getElementById('mobileDrawer');
    const toggle = document.getElementById('menuToggle');
    if (drawer.classList.contains('open') && !drawer.contains(e.target) && e.target !== toggle) {
      drawer.classList.remove('open');
      toggle.textContent = '☰';
    }
  });

  /* ════════ INIT ════════ */
  renderList();
</script>
</body>
</html>
